# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# 场景 1+2+3：创建集群 → my.cnf golden 逐字节比对 → 复制建立（condition + 主写从读）
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: create-replication
spec:
  template: true
  steps:
    - name: create-cluster
      try:
        - apply:
            file: ../_shared/cluster.yaml
        - assert:
            file: ../_shared/ready-assert.yaml
        - script:
            timeout: 3m
            content: |
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
      catch:
        - events: {}
        - describe:
            apiVersion: mysql.presslabs.org/v1alpha1
            kind: MysqlCluster
        - podLogs:
            selector: mysql.presslabs.org/cluster=e2e
            tail: 120

    - name: replication
      try:
        # 节点 condition：pod-0 为 Master、pod-1 在复制（operator↔orchestrator API 契约）
        - script:
            timeout: 5m
            content: |
              set -eu
              for i in $(seq 1 60); do
                master=$(kubectl get mysqlcluster e2e -n "$NAMESPACE" -o json | \
                  jq -r --arg n "e2e-mysql-0.mysql.$NAMESPACE" \
                  '.status.nodes[]? | select(.name==$n) | .conditions[]? | select(.type=="Master") | .status')
                repl=$(kubectl get mysqlcluster e2e -n "$NAMESPACE" -o json | \
                  jq -r --arg n "e2e-mysql-1.mysql.$NAMESPACE" \
                  '.status.nodes[]? | select(.name==$n) | .conditions[]? | select(.type=="Replicating") | .status')
                if [ "$master" = "True" ] && [ "$repl" = "True" ]; then
                  echo CONDITIONS_OK
                  exit 0
                fi
                sleep 5
              done
              echo "节点 condition 超时: master=$master repl=$repl"
              kubectl get mysqlcluster e2e -n "$NAMESPACE" -o jsonpath='{.status.nodes}'
              exit 1
            check:
              (contains($stdout, 'CONDITIONS_OK')): true
        # 主库写入 → 从库读到
        - script:
            timeout: 3m
            content: |
              set -eu
              # 写入带重试：Ready 刚过时 pod 可能处于 operator 触发的瞬时滚动中
              wrote=0
              for i in $(seq 1 24); do
                if kubectl exec -n "$NAMESPACE" e2e-mysql-0 -c mysql -- \
                  mysql -uroot -pe2e-root-password -e \
                  "CREATE DATABASE IF NOT EXISTS e2e_test; CREATE TABLE IF NOT EXISTS e2e_test.t (id INT PRIMARY KEY, val VARCHAR(64)); REPLACE INTO e2e_test.t VALUES (1, 'hello-from-master');" 2>/dev/null; then
                  wrote=1; break
                fi
                sleep 5
              done
              if [ "$wrote" != "1" ]; then echo "主库写入失败"; exit 1; fi
              for i in $(seq 1 30); do
                out=$(kubectl exec -n "$NAMESPACE" e2e-mysql-1 -c mysql -- \
                  mysql -uroot -pe2e-root-password -N -e \
                  "SELECT val FROM e2e_test.t WHERE id=1" 2>/dev/null || true)
                if [ "$out" = "hello-from-master" ]; then
                  echo REPLICATION_OK
                  exit 0
                fi
                sleep 2
              done
              echo "复制超时：从库未读到主库写入"
              exit 1
            check:
              (contains($stdout, 'REPLICATION_OK')): true
      catch:
        - events: {}
        - describe:
            apiVersion: mysql.presslabs.org/v1alpha1
            kind: MysqlCluster
        - podLogs:
            selector: mysql.presslabs.org/cluster=e2e
            tail: 120
    - name: mycnf-golden
      try:
        - script:
            env:
              - name: GOLDEN_FILE
                value: ($values.golden)
            content: |
              set -eu
              actual=$(mktemp)
              kubectl get cm e2e-mysql -n "$NAMESPACE" -o jsonpath='{.data.my\.cnf}' > "$actual"
              if [ ! -f "$GOLDEN_FILE" ]; then
                echo "golden 文件缺失: $GOLDEN_FILE"
                echo "从下方日志采集实际 my.cnf 入库即完成步骤 0（本分支无 operator 代码改动，构建产物即基线）："
                echo "-----BEGIN ACTUAL MY.CNF-----"
                cat "$actual"
                echo "-----END ACTUAL MY.CNF-----"
                exit 1
              fi
              # 逐字节比对（仅容忍末尾换行差异，日志采集会引入）：
              # 存量版本 my.cnf 任何变化都必须是有意的（golden/README.md）
              g=$(mktemp); a2=$(mktemp)
              sed -e '$a\' "$GOLDEN_FILE" > "$g"
              sed -e '$a\' "$actual" > "$a2"
              diff -u "$g" "$a2"
              echo GOLDEN_OK
            check:
              (contains($stdout, 'GOLDEN_OK')): true

