# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# 场景 1+2+3：创建集群 → my.cnf golden 逐字节比对 → 复制建立（condition + 主写从读）
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: create-replication
spec:
  template: true
  steps:
    - name: create-cluster
      use:
        template: ../_shared/create-cluster-step.yaml

    # golden 比对紧跟创建：集群刚就绪即是文档描述的"创建完成"时点
    - name: mycnf-golden
      try:
        - script:
            env:
              - name: GOLDEN_FILE
                value: ($values.golden)
            content: |
              set -eu
              actual=$(mktemp)
              kubectl get cm e2e-mysql -n "$NAMESPACE" -o jsonpath='{.data.my\.cnf}' > "$actual"
              if [ ! -f "$GOLDEN_FILE" ]; then
                echo "golden 文件缺失: $GOLDEN_FILE"
                echo "从下方日志采集实际 my.cnf 入库即完成步骤 0（本分支无 operator 代码改动，构建产物即基线）："
                echo "-----BEGIN ACTUAL MY.CNF-----"
                cat "$actual"
                echo "-----END ACTUAL MY.CNF-----"
                exit 1
              fi
              # 逐字节比对（仅容忍末尾换行差异，日志采集会引入）：
              # 存量版本 my.cnf 任何变化都必须是有意的（golden/README.md）。
              # 末行补换行用 awk '1'：GNU sed 的 '$a\' 在 BSD/macOS sed 上是静默空操作
              g=$(mktemp); a2=$(mktemp)
              awk '1' "$GOLDEN_FILE" > "$g"
              awk '1' "$actual" > "$a2"
              diff -u "$g" "$a2"

    - name: replication
      try:
        # 节点 condition：pod-0 为 Master、pod-1 在复制（operator↔orchestrator API 契约）
        - script:
            # 脚本内轮询 60×5s=300s，超时须大于该值，否则超时后的诊断输出跑不到
            timeout: 7m
            content: |
              sh ../_shared/wait-node-conditions.sh e2e-mysql-0=Master e2e-mysql-1=Replicating
        # 主库写入 → 从库读到
        - script:
            timeout: 5m
            content: |
              set -eu
              sh ../_shared/mysql-write-retry.sh e2e-mysql-0 1 hello-from-master
              sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 hello-from-master
      catch:
        # events/describe/podLogs 由全局 error.catch 收集，这里只补本用例特有的现场：
        # mysql 容器若发生过重启，抓上一次运行（首次初始化）的死因
        - script:
            content: |
              kubectl get pods -n "$NAMESPACE" -o wide
              echo "===== previous logs of e2e-mysql-0/mysql (if restarted) ====="
              kubectl logs e2e-mysql-0 -c mysql -n "$NAMESPACE" --previous --tail=80 2>&1 || true
