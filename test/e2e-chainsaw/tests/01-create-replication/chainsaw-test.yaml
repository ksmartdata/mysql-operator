# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# Scenarios 1+2+3: create cluster -> byte-for-byte my.cnf golden diff ->
# replication established (node conditions + write on master / read on replica)
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: create-replication
spec:
  template: true
  steps:
    - name: create-cluster
      use:
        template: ../_shared/create-cluster-step.yaml

    # Golden diff right after creation: the just-ready cluster is the
    # "creation done" point the docs describe
    - name: mycnf-golden
      try:
        - script:
            env:
              - name: GOLDEN_FILE
                value: ($values.golden)
            content: |
              set -eu
              actual=$(mktemp)
              kubectl get cm e2e-mysql -n "$NAMESPACE" -o jsonpath='{.data.my\.cnf}' > "$actual"
              if [ ! -f "$GOLDEN_FILE" ]; then
                echo "golden file missing: $GOLDEN_FILE"
                echo "To finish step 0, capture the actual my.cnf below and commit it (this branch has no operator code changes, so the build output is the baseline):"
                echo "-----BEGIN ACTUAL MY.CNF-----"
                cat "$actual"
                echo "-----END ACTUAL MY.CNF-----"
                exit 1
              fi
              # Byte-for-byte diff, only tolerating a trailing-newline
              # difference (log capture introduces one): any my.cnf change for
              # existing versions must be intentional (golden/README.md).
              # awk '1' appends the missing final newline; GNU sed's '$a\' is
              # a silent no-op with BSD/macOS sed
              g=$(mktemp); a2=$(mktemp)
              awk '1' "$GOLDEN_FILE" > "$g"
              awk '1' "$actual" > "$a2"
              diff -u "$g" "$a2"

    - name: replication
      try:
        # Node conditions: pod-0 is Master, pod-1 is replicating (the
        # operator<->orchestrator API contract)
        - script:
            # The script polls 60x5s=300s; the timeout must exceed that or the
            # post-timeout diagnostics never run
            timeout: 7m
            content: |
              sh ../_shared/wait-node-conditions.sh e2e-mysql-0=Master e2e-mysql-1=Replicating
        # Write on the master -> read it back on the replica
        - script:
            timeout: 5m
            content: |
              set -eu
              sh ../_shared/mysql-write-retry.sh e2e-mysql-0 1 hello-from-master
              sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 hello-from-master
      catch:
        # events/describe/podLogs are collected by the global error.catch;
        # only capture what is specific to this test: if the mysql container
        # has restarted, grab the previous run (first init) to see why it died
        - script:
            content: |
              kubectl get pods -n "$NAMESPACE" -o wide
              echo "===== previous logs of e2e-mysql-0/mysql (if restarted) ====="
              kubectl logs e2e-mysql-0 -c mysql -n "$NAMESPACE" --previous --tail=80 2>&1 || true
