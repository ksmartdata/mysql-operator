# 与 mcamel 下发同形：显式 mysqlVersion（完整版本号）+ 显式 image（image 优先）。
# 存储用内存介质 emptyDir：只测 operator 行为不测持久化，且 CI runner 磁盘 fsync 慢，
# mysql:5.7 入口脚本初始化超过 liveness probe 的 60s 窗口会被强杀（首轮 CI 实测踩坑）。
apiVersion: v1
kind: Secret
metadata:
  name: e2e-cluster-secret
type: Opaque
stringData:
  ROOT_PASSWORD: e2e-root-password
---
apiVersion: mysql.presslabs.org/v1alpha1
kind: MysqlCluster
metadata:
  name: e2e
spec:
  replicas: 2
  secretName: e2e-cluster-secret
  mysqlVersion: ($values.version)
  image: ($values.image)
  podSpec:
    resources:
      requests:
        cpu: 100m
        memory: 512Mi
  volumeSpec:
    emptyDir:
      medium: Memory
