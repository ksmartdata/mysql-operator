# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# 场景 5：patch spec.mysqlConf → my.cnf 更新 → 滚动完成后集群回 Ready
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: config-update
spec:
  template: true
  steps:
    - name: create-cluster
      try:
        - apply:
            file: ../_shared/cluster.yaml
        - assert:
            file: ../_shared/ready-assert.yaml
        - script:
            timeout: 3m
            content: |
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
      catch:
        - events: {}
        - describe:
            apiVersion: mysql.presslabs.org/v1alpha1
            kind: MysqlCluster

    - name: patch-mysql-conf
      try:
        - patch:
            resource:
              apiVersion: mysql.presslabs.org/v1alpha1
              kind: MysqlCluster
              metadata:
                name: e2e
              spec:
                mysqlConf:
                  max_connections: "300"
        # 自定义参数进入生成的 my.cnf
        - script:
            timeout: 2m
            content: |
              set -eu
              for i in $(seq 1 20); do
                if kubectl get cm e2e-mysql -n "$NAMESPACE" -o jsonpath='{.data.my\.cnf}' | grep -q "max_connections"; then
                  echo CONF_OK
                  exit 0
                fi
                sleep 5
              done
              echo "my.cnf 未出现 max_connections"
              exit 1
            check:
              (contains($stdout, 'CONF_OK')): true

    - name: rollout-and-ready
      try:
        - script:
            timeout: 8m
            content: |
              set -eu
              kubectl rollout status sts/e2e-mysql -n "$NAMESPACE" --timeout=6m
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
              echo ROLLOUT_OK
            check:
              (contains($stdout, 'ROLLOUT_OK')): true
        - assert:
            file: ../_shared/ready-assert.yaml
      catch:
        - events: {}
        - describe:
            apiVersion: mysql.presslabs.org/v1alpha1
            kind: MysqlCluster
        - podLogs:
            selector: mysql.presslabs.org/cluster=e2e
            tail: 120
