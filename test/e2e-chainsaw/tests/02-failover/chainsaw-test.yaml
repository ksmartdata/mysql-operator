# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# 场景 4：强杀主库 pod → orchestrator DeadMaster 恢复提升从库 → 集群恢复 → 旧主以从库身份回归
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: failover
spec:
  template: true
  steps:
    - name: create-cluster
      use:
        template: ../_shared/create-cluster-step.yaml

    - name: seed-data
      try:
        - script:
            timeout: 5m
            content: |
              set -eu
              sh ../_shared/mysql-write-retry.sh e2e-mysql-0 1 before-failover
              # 确认 seed 已复制到从库，failover 后在新主上校验这条数据才有意义
              sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 before-failover

    - name: kill-master
      try:
        - script:
            timeout: 4m
            content: |
              set -eu
              # 强杀（跳过 preStop 的 graceful-master-takeover-auto）测的才是崩溃 failover：
              # 优雅删除会先走计划内主从切换，orchestrator 的 DeadMaster 自动恢复
              # （chart 默认 RecoverMasterClusterFilters=['.*']）反而测不到。
              # kubectl delete 默认 --wait 按 UID 等待删除完成，不受 sts 同名重建干扰
              kubectl delete pod e2e-mysql-0 -n "$NAMESPACE" --force --grace-period=0

    - name: promotion-and-recover
      try:
        # pod-1 被提升为新主（2 副本下 orchestrator 唯一可选项）
        - script:
            # 脚本内轮询 70×5s=350s，超时须大于该值
            timeout: 8m
            content: |
              WAIT_ITERS=70 sh ../_shared/wait-node-conditions.sh e2e-mysql-1=Master
        # 集群整体恢复：sts 重建出新 pod-0 并全体就绪（assert 超时 10m 覆盖全量重克隆）
        - assert:
            file: ../_shared/ready-assert.yaml
        # 旧主以从库身份回归复制
        - script:
            # 串联等待 170s + 300s，超时须大于其和
            timeout: 10m
            content: |
              set -eu
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
              sh ../_shared/wait-node-conditions.sh e2e-mysql-0=Replicating
        # 新主可写，且 failover 前的数据仍在
        - script:
            timeout: 5m
            content: |
              set -eu
              READ_ITERS=24 READ_SLEEP=5 sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 before-failover
              sh ../_shared/mysql-write-retry.sh e2e-mysql-1 2 after-failover
