# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# 场景 4：kill 主库 pod → orchestrator 提升从库 → 集群恢复 → 旧主以从库身份回归
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: failover
spec:
  template: true
  steps:
    - name: create-cluster
      try:
        - apply:
            file: ../_shared/cluster.yaml
        - assert:
            file: ../_shared/ready-assert.yaml
        - script:
            timeout: 8m
            content: |
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
              # operator 在首次 Ready 后可能再触发一轮 sts 滚动（实测），等待收敛
              sleep 15
              kubectl rollout status sts/e2e-mysql -n "$NAMESPACE" --timeout=300s
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
      catch:
        - events: {}
        - describe:
            apiVersion: mysql.presslabs.org/v1alpha1
            kind: MysqlCluster

    - name: seed-data
      try:
        - script:
            timeout: 3m
            content: |
              set -eu
              # 写入带重试：Ready 刚过时 pod 可能处于 operator 触发的瞬时滚动中
              err=""
              for i in $(seq 1 24); do
                if err=$(kubectl exec -n "$NAMESPACE" e2e-mysql-0 -c mysql -- \
                  mysql --no-defaults -uroot -pe2e-root-password -e \
                  "CREATE DATABASE IF NOT EXISTS e2e_test; CREATE TABLE IF NOT EXISTS e2e_test.t (id INT PRIMARY KEY, val VARCHAR(64)); REPLACE INTO e2e_test.t VALUES (1, 'before-failover');" 2>&1); then
                  echo SEED_OK
                  exit 0
                fi
                echo "写入尝试 $i 失败: $err"
                sleep 5
              done
              echo "seed 写入失败"
              kubectl exec -n "$NAMESPACE" e2e-mysql-0 -c mysql -- \
                mysql --no-defaults -uroot -pe2e-root-password -e \
                "SELECT @@hostname, @@read_only, @@super_read_only" 2>&1 || true
              exit 1
            check:
              (contains($stdout, 'SEED_OK')): true

    - name: kill-master
      try:
        - script:
            content: |
              kubectl delete pod e2e-mysql-0 -n "$NAMESPACE" --wait=false

    - name: promotion-and-recover
      try:
        # pod-1 被提升为新主（2 副本下 orchestrator 唯一可选项）
        - script:
            timeout: 6m
            content: |
              set -eu
              for i in $(seq 1 70); do
                master=$(kubectl get mysqlcluster e2e -n "$NAMESPACE" -o json | \
                  jq -r --arg n "e2e-mysql-1.mysql.$NAMESPACE" \
                  '.status.nodes[]? | select(.name==$n) | .conditions[]? | select(.type=="Master") | .status')
                if [ "$master" = "True" ]; then
                  echo PROMOTION_OK
                  exit 0
                fi
                sleep 5
              done
              echo "提升超时：pod-1 未成为 Master"
              kubectl get mysqlcluster e2e -n "$NAMESPACE" -o jsonpath='{.status.nodes}'
              exit 1
            check:
              (contains($stdout, 'PROMOTION_OK')): true
        # 集群整体恢复，旧主 pod 重建后以从库身份回归复制
        - assert:
            file: ../_shared/ready-assert.yaml
        - script:
            timeout: 6m
            content: |
              set -eu
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
              for i in $(seq 1 60); do
                repl=$(kubectl get mysqlcluster e2e -n "$NAMESPACE" -o json | \
                  jq -r --arg n "e2e-mysql-0.mysql.$NAMESPACE" \
                  '.status.nodes[]? | select(.name==$n) | .conditions[]? | select(.type=="Replicating") | .status')
                if [ "$repl" = "True" ]; then
                  echo REJOIN_OK
                  exit 0
                fi
                sleep 5
              done
              echo "旧主回归超时"
              kubectl get mysqlcluster e2e -n "$NAMESPACE" -o jsonpath='{.status.nodes}'
              exit 1
            check:
              (contains($stdout, 'REJOIN_OK')): true
        # 新主可写，且 failover 前的数据仍在
        - script:
            timeout: 3m
            content: |
              set -eu
              for i in $(seq 1 24); do
                if kubectl exec -n "$NAMESPACE" e2e-mysql-1 -c mysql -- \
                    mysql --no-defaults -uroot -pe2e-root-password -N -e \
                    "SELECT val FROM e2e_test.t WHERE id=1" 2>/dev/null | grep -q before-failover; then
                  kubectl exec -n "$NAMESPACE" e2e-mysql-1 -c mysql -- \
                    mysql --no-defaults -uroot -pe2e-root-password -e \
                    "REPLACE INTO e2e_test.t VALUES (2, 'after-failover');"
                  echo FAILOVER_OK
                  exit 0
                fi
                sleep 5
              done
              echo "新主验证失败：数据缺失或不可写"
              exit 1
            check:
              (contains($stdout, 'FAILOVER_OK')): true
      catch:
        - events: {}
        - describe:
            apiVersion: mysql.presslabs.org/v1alpha1
            kind: MysqlCluster
        - podLogs:
            selector: mysql.presslabs.org/cluster=e2e
            tail: 120
