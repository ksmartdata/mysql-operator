# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# Scenario 4: force-kill the master pod -> orchestrator DeadMaster recovery
# promotes the replica -> cluster recovers -> old master rejoins as a replica
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: failover
spec:
  template: true
  steps:
    - name: create-cluster
      use:
        template: ../_shared/create-cluster-step.yaml

    - name: seed-data
      try:
        - script:
            timeout: 5m
            content: |
              set -eu
              sh ../_shared/mysql-write-retry.sh e2e-mysql-0 1 before-failover
              # Confirm the seed has replicated to the replica; only then does
              # verifying this row on the new master after failover mean anything
              sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 before-failover

    - name: kill-master
      try:
        - script:
            timeout: 4m
            content: |
              set -eu
              # Force-kill (skipping the preStop graceful-master-takeover-auto
              # hook) is what exercises crash failover: graceful deletion goes
              # through a planned takeover first and would never hit
              # orchestrator's DeadMaster auto-recovery (chart default
              # RecoverMasterClusterFilters=['.*']).
              # kubectl delete waits by UID by default (--wait), immune to the
              # sts recreating a pod with the same name
              kubectl delete pod e2e-mysql-0 -n "$NAMESPACE" --force --grace-period=0

    - name: promotion-and-recover
      try:
        # pod-1 gets promoted to new master (orchestrator's only candidate
        # with 2 replicas)
        - script:
            # The script polls 70x5s=350s; the timeout must exceed that
            timeout: 8m
            content: |
              WAIT_ITERS=70 sh ../_shared/wait-node-conditions.sh e2e-mysql-1=Master
        # Whole cluster recovers: the sts recreates pod-0 and all replicas
        # become ready (the 10m assert timeout covers the full re-clone)
        - assert:
            file: ../_shared/ready-assert.yaml
        # The old master rejoins replication as a replica
        - script:
            # Serial waits of 170s + 300s; the timeout must exceed their sum
            timeout: 10m
            content: |
              set -eu
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
              sh ../_shared/wait-node-conditions.sh e2e-mysql-0=Replicating
        # The new master is writable and the pre-failover data is still there
        - script:
            timeout: 5m
            content: |
              set -eu
              READ_ITERS=24 READ_SLEEP=5 sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 before-failover
              sh ../_shared/mysql-write-retry.sh e2e-mysql-1 2 after-failover
