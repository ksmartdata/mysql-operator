# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
# Scenario 4: force-kill the master pod -> orchestrator DeadMaster recovery
# promotes the replica -> cluster recovers -> old master rejoins as a replica
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: failover
spec:
  template: true
  steps:
    - name: create-cluster
      use:
        template: ../_shared/create-cluster-step.yaml

    - name: seed-data
      try:
        - script:
            timeout: 5m
            content: |
              set -eu
              sh ../_shared/mysql-write-retry.sh e2e-mysql-0 1 before-failover
              # Confirm the seed has replicated to the replica; only then does
              # verifying this row on the new master after failover mean anything
              sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 before-failover
              # Force the freshly created table's pages to disk on the future
              # clone donor: killing the master right after seeding recreates
              # pod-0, whose xtrabackup clone can otherwise copy a not-yet-
              # flushed .ibd and fail prepare with "Could not find any file
              # associated with the tablespace ID" (memory emptyDir + slow
              # runners widen the window; product-side investigation tracked
              # separately)
              . ../_shared/lib.sh
              fetch_oppass
              kubectl exec -n "$NAMESPACE" e2e-mysql-1 -c mysql -- \
                mysql --no-defaults -h127.0.0.1 -usys_operator -p"$OPPASS" -e \
                "FLUSH TABLE sys_operator.e2e_t FOR EXPORT; UNLOCK TABLES;"

    - name: kill-master
      try:
        - script:
            timeout: 4m
            content: |
              set -eu
              # Force-kill (skipping the preStop graceful-master-takeover-auto
              # hook) is what exercises crash failover: graceful deletion goes
              # through a planned takeover first and would never hit
              # orchestrator's DeadMaster auto-recovery (chart default
              # RecoverMasterClusterFilters=['.*']).
              # kubectl delete waits by UID by default (--wait), immune to the
              # sts recreating a pod with the same name
              kubectl delete pod e2e-mysql-0 -n "$NAMESPACE" --force --grace-period=0

    - name: promotion-and-recover
      try:
        # The xtrabackup stream clone of the recreated pod-0 occasionally hits
        # a race on slow runners: prepare fails with "Could not find any file
        # associated with the tablespace ID" and the pod crashloops (product-
        # side investigation tracked separately). Give the first clone attempt
        # 5 minutes, dump the init logs, then recreate the pod ONCE to retry.
        # The asserts below still gate the final state.
        - script:
            timeout: 7m
            content: |
              set -u
              for i in $(seq 1 60); do
                ready=$(kubectl get pod e2e-mysql-0 -n "$NAMESPACE" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
                if [ "$ready" = "True" ]; then
                  echo "pod-0 ready on the first clone attempt"
                  exit 0
                fi
                sleep 5
              done
              echo "pod-0 not Ready after 300s - suspected xtrabackup clone race; init container logs:"
              kubectl logs e2e-mysql-0 -n "$NAMESPACE" -c init --tail=30 2>/dev/null || true
              kubectl logs e2e-mysql-0 -n "$NAMESPACE" -c init --previous --tail=30 2>/dev/null || true
              echo "deleting pod-0 for one clone retry"
              kubectl delete pod e2e-mysql-0 -n "$NAMESPACE" --ignore-not-found --wait=false
        # pod-1 gets promoted to new master (orchestrator's only candidate
        # with 2 replicas)
        - script:
            # The script polls 70x5s=350s; the timeout must exceed that
            timeout: 8m
            content: |
              WAIT_ITERS=70 sh ../_shared/wait-node-conditions.sh e2e-mysql-1=Master
        # Whole cluster recovers: the sts recreates pod-0 and all replicas
        # become ready (the 10m assert timeout covers the full re-clone)
        - assert:
            file: ../_shared/ready-assert.yaml
        # The old master rejoins replication as a replica
        - script:
            # Serial waits of 170s + 300s; the timeout must exceed their sum
            timeout: 10m
            content: |
              set -eu
              kubectl wait mysqlcluster/e2e -n "$NAMESPACE" --for=condition=Ready=True --timeout=170s
              sh ../_shared/wait-node-conditions.sh e2e-mysql-0=Replicating
        # The new master is writable and the pre-failover data is still there
        - script:
            timeout: 5m
            content: |
              set -eu
              READ_ITERS=24 READ_SLEEP=5 sh ../_shared/mysql-read-until.sh e2e-mysql-1 1 before-failover
              sh ../_shared/mysql-write-retry.sh e2e-mysql-1 2 after-failover
